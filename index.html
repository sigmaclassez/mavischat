<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sigma Classes Community</title>
    <style>
        /* --- ALL YOUR ORIGINAL CSS --- */
        :root {
            --bg: #0e0e0e;
            --surface: #17212b;
            --surface-hover: #202b36;
            --surface-light: #1e2a38;
            --border: #0e1621;
            --text: #ffffff;
            --text-secondary: #8e9ba8;
            --accent: #2b5278;
            --accent-hover: #3a6d99;
            --accent-light: #5eb5f7;
            --message-own: #2b5278;
            --message-other: #182533;
            --green: #5db548;
            --danger: #e74c3c;
            --radius: 12px;
            --radius-sm: 8px;
            --shadow: 0 4px 20px rgba(0,0,0,0.4);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* Auth Screen */
        .auth-screen {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a2a3a 0%, #0e1e2e 100%);
            position: relative;
            overflow: hidden;
        }
        .auth-screen::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(43,82,120,0.15) 1px, transparent 1px);
            background-size: 40px 40px;
            animation: drift 25s linear infinite;
        }
        @keyframes drift {
            0% { transform: translate(0,0); }
            100% { transform: translate(-40px,-40px); }
        }
        .auth-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 48px 40px;
            width: 100%;
            max-width: 400px;
            position: relative;
            z-index: 1;
            box-shadow: var(--shadow);
            animation: slideUp 0.5s ease-out;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .auth-logo {
            width: 72px;
            height: 72px;
            background: linear-gradient(135deg, var(--accent), var(--accent-hover));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            box-shadow: 0 8px 32px rgba(43,82,120,0.4);
        }
        .auth-logo svg { width: 36px; height: 36px; color: white; }
        .auth-title { font-size: 26px; font-weight: 700; text-align: center; margin-bottom: 8px; }
        .auth-subtitle { font-size: 14px; color: var(--text-secondary); text-align: center; margin-bottom: 32px; }
        .form-group { margin-bottom: 20px; }
        .form-label { display: block; font-size: 13px; font-weight: 500; color: var(--text-secondary); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
        .form-input {
            width: 100%;
            padding: 12px 16px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text);
            font-size: 15px;
            font-family: inherit;
            transition: all 0.2s;
            outline: none;
        }
        .form-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(43,82,120,0.2); }
        .auth-btn {
            width: 100%;
            padding: 14px;
            background: var(--accent);
            border: none;
            border-radius: var(--radius-sm);
            color: white;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 8px;
        }
        .auth-btn:hover { background: var(--accent-hover); }
        .auth-btn:disabled { opacity: 0.5; cursor: wait; }
        .auth-toggle { text-align: center; margin-top: 20px; font-size: 14px; color: var(--text-secondary); }
        .auth-toggle span { color: var(--accent-light); cursor: pointer; font-weight: 500; }
        .auth-error {
            background: rgba(231,76,60,0.1); border: 1px solid rgba(231,76,60,0.3); color: var(--danger);
            padding: 10px 14px; border-radius: var(--radius-sm); font-size: 13px; margin-bottom: 16px;
            display: none;
        }
        .auth-error.visible { display: block; }

        /* App Layout */
        .app { display: none; height: 100vh; }
        .app.active { display: flex; }
        .sidebar {
            width: 380px; min-width: 280px; max-width: 420px;
            border-right: 1px solid var(--border);
            display: flex; flex-direction: column; background: var(--surface); position: relative;
        }
        .chat-area {
            flex: 1; display: flex; flex-direction: column; background: var(--bg); position: relative;
        }

        /* Sidebar Elements */
        .sidebar-header {
            padding: 14px 16px; display: flex; align-items: center; gap: 12px;
            border-bottom: 1px solid var(--border); background: var(--surface);
        }
        .search-box { flex: 1; position: relative; }
        .search-box input {
            width: 100%; padding: 8px 12px 8px 32px; background: var(--bg); border: none;
            border-radius: 20px; color: var(--text); font-size: 14px; outline: none;
        }
        .search-box svg { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); width: 16px; height: 16px; color: #4a5a6a; }
        
        .chat-list { flex: 1; overflow-y: auto; padding: 8px 0; }
        .chat-item {
            display: flex; align-items: center; gap: 12px; padding: 10px 16px;
            cursor: pointer; transition: all 0.15s;
        }
        .chat-item:hover { background: var(--surface-hover); }
        .chat-item.active { background: var(--accent); }
        .chat-avatar { width: 52px; height: 52px; border-radius: 50%; object-fit: cover; background: var(--surface-light); }
        .chat-info { flex: 1; min-width: 0; }
        .chat-name { font-weight: 600; font-size: 14px; color: white; }

        /* Chat Header & Messages */
        .chat-header {
            padding: 10px 20px; display: flex; align-items: center; gap: 12px;
            border-bottom: 1px solid var(--border); background: var(--surface); min-height: 64px;
        }
        .chat-header-info { flex: 1; min-width: 0; }
        .chat-header-name { font-weight: 600; font-size: 15px; margin-bottom: 2px; }
        
        .messages-area {
            flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 4px;
            background: linear-gradient(180deg, #0e1621 0%, #0e0e0e 100%);
        }
        .message { display: flex; gap: 8px; max-width: 70%; align-self: flex-start; margin-bottom: 8px; }
        .message.own { align-self: flex-end; flex-direction: row-reverse; }
        .msg-bubble {
            padding: 10px 14px; border-radius: 18px; font-size: 14px; line-height: 1.4; position: relative;
        }
        .message:not(.own) .msg-bubble { background: var(--message-other); border-bottom-left-radius: 4px; }
        .message.own .msg-bubble { background: var(--message-own); border-bottom-right-radius: 4px; }
        .msg-time { font-size: 11px; opacity: 0.7; margin-top: 4px; display: block; text-align: right; }

        /* Input Area */
        .input-area {
            padding: 14px 20px; background: var(--surface); border-top: 1px solid var(--border);
            display: flex; align-items: flex-end; gap: 10px;
        }
        .input-wrapper {
            flex: 1; background: var(--bg); border-radius: 22px; padding: 8px 16px; display: flex; align-items: center;
        }
        .message-input {
            flex: 1; border: none; background: transparent; color: var(--text); font-size: 15px;
            resize: none; max-height: 100px; min-height: 20px; outline: none;
        }
        .send-btn {
            width: 44px; height: 44px; border-radius: 50%; border: none; background: var(--accent-light);
            color: white; cursor: pointer; display: flex; align-items: center; justify-content: center;
        }
        .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

        /* Empty State */
        .empty-chat {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100%; color: var(--text-secondary); text-align: center; padding: 40px;
        }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="auth-screen" id="auth-screen">
    <div class="auth-card">
        <div class="auth-logo">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 2L2 7l10 5 10-5-10-5z"></path><polyline points="2 17 12 22 22 17"></polyline><polyline points="2 12 12 17 22 12"></polyline>
            </svg>
        </div>
        <h1 class="auth-title" id="auth-title">Sigma Classes</h1>
        <p class="auth-subtitle" id="auth-subtitle">Community Chat by Alok Sir & Adarsh Sir</p>

        <div class="auth-error" id="auth-error"></div>

        <form id="auth-form" onsubmit="return false;">
            <div class="form-group" id="name-group" style="display:none;">
                <label class="form-label">Display Name</label>
                <input type="text" class="form-input" id="reg-name" placeholder="E.g., Rahul Kumar">
            </div>
            <div class="form-group">
                <label class="form-label">Username</label>
                <input type="text" class="form-input" id="auth-username" placeholder="@username">
            </div>
            <div class="form-group">
                <label class="form-label">Password</label>
                <input type="password" class="form-input" id="auth-password" placeholder="Minimum 6 characters">
            </div>
            <button type="submit" class="auth-btn" id="auth-btn">Sign In</button>
        </form>

        <div class="auth-toggle">
            <span id="auth-toggle-text">Don't have an account?</span>
            <span id="auth-toggle-link">Sign Up</span>
        </div>
    </div>
</div>

<div class="app" id="app">
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="search-box">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                <input type="text" placeholder="Contacts loaded from Cloud..." readonly>
            </div>
            <button id="logout-btn" style="background: none; border: none; color: var(--danger); cursor: pointer; font-weight: bold; margin-left: 10px;">Exit</button>
        </div>
        <div class="chat-list" id="chat-list">
            </div>
    </div>

    <div class="chat-area" id="chat-area">
        <div class="chat-header hidden" id="chat-header">
            <img src="" class="chat-avatar" id="header-avatar" style="width: 40px; height: 40px;">
            <div class="chat-header-info">
                <div class="chat-header-name" id="header-name">Select a chat</div>
                <div style="font-size: 13px; color: var(--accent-light);">Secure Private Room</div>
            </div>
        </div>

        <div class="messages-area" id="messages-area">
            <div class="empty-chat" id="empty-chat">
                <div style="background: linear-gradient(135deg, #2b5278, #5eb5f7); width: 90px; height: 90px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-bottom: 24px; color: white;">
                    <svg width="42" height="42" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 2L2 7l10 5 10-5-10-5z"></path><polyline points="2 17 12 22 22 17"></polyline><polyline points="2 12 12 17 22 12"></polyline></svg>
                </div>
                <h3 style="color: white; font-size: 20px; margin-bottom: 8px;">Sigma Classes Community</h3>
                <p>Welcome to <b>Sigma Classes Community</b>. A safe space for students to connect, share, and learn together.</p>
                <p style="margin-top: 16px; font-size: 12px; color: #5eb5f7;">👨‍🏫 Admin Access: Owner Only</p>
            </div>
            <div id="messages-container" style="display:none; flex-direction: column; gap: 4px;"></div>
        </div>

        <div class="input-area hidden" id="input-area">
            <div class="input-wrapper">
                <textarea class="message-input" id="message-input" placeholder="Message..." rows="1"></textarea>
            </div>
            <button class="send-btn" id="send-btn" disabled>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
            </button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, updateProfile, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";
    import { getFirestore, collection, doc, setDoc, addDoc, query, orderBy, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

    // IMPORTANT: Replace with your actual Firebase Config
    const firebaseConfig = {
        apiKey: "AIzaSyBdz1-Y06YkgAD-Ty7AQkSRYb1dwNDAoqo",
        authDomain: "sigmachat-7b6fc.firebaseapp.com",
        projectId: "sigmachat-7b6fc",
        storageBucket: "sigmachat-7b6fc.firebasestorage.app",
        messagingSenderId: "991645777861",
        appId: "1:991645777861:web:940b910b80fdcd90c815ac"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // App State
    let isRegistering = false;
    let currentUser = null;
    let currentRoomId = null;
    let unsubscribeUsers = null;
    let unsubscribeMessages = null;

    // DOM Elements
    const DOM = {
        authScreen: document.getElementById('auth-screen'),
        appScreen: document.getElementById('app'),
        authForm: document.getElementById('auth-form'),
        authToggle: document.getElementById('auth-toggle-link'),
        authError: document.getElementById('auth-error'),
        authBtn: document.getElementById('auth-btn'),
        chatList: document.getElementById('chat-list'),
        chatHeader: document.getElementById('chat-header'),
        headerName: document.getElementById('header-name'),
        headerAvatar: document.getElementById('header-avatar'),
        emptyChat: document.getElementById('empty-chat'),
        msgContainer: document.getElementById('messages-container'),
        inputArea: document.getElementById('input-area'),
        msgInput: document.getElementById('message-input'),
        sendBtn: document.getElementById('send-btn'),
        logoutBtn: document.getElementById('logout-btn')
    };

    // --- 1. AUTHENTICATION LOGIC ---
    DOM.authToggle.addEventListener('click', () => {
        isRegistering = !isRegistering;
        document.getElementById('auth-title').textContent = isRegistering ? 'Create Account' : 'Sigma Classes';
        document.getElementById('auth-btn').textContent = isRegistering ? 'Sign Up' : 'Sign In';
        document.getElementById('auth-toggle-text').textContent = isRegistering ? 'Already have an account?' : "Don't have an account?";
        DOM.authToggle.textContent = isRegistering ? 'Sign In' : 'Sign Up';
        document.getElementById('name-group').style.display = isRegistering ? 'block' : 'none';
        DOM.authError.classList.remove('visible');
    });

    DOM.authForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const rawUsername = document.getElementById('auth-username').value.trim().toLowerCase();
        const password = document.getElementById('auth-password').value;
        const name = document.getElementById('reg-name').value.trim();

        if (!rawUsername || !password) return showError("Please fill all fields");
        if (password.length < 6) return showError("Password must be at least 6 characters");

        // Secretly map username to email for Firebase
        const fakeEmail = `${rawUsername.replace(/[^a-z0-9]/g, '')}@sigmachat.com`; 
        DOM.authBtn.disabled = true;

        try {
            if (isRegistering) {
                if (!name) throw new Error("Display Name is required");
                const cred = await createUserWithEmailAndPassword(auth, fakeEmail, password);
                
                // Set default avatar based on name
                const avatar = `https://ui-avatars.com/api/?name=${encodeURIComponent(name)}&background=2b5278&color=fff`;
                await updateProfile(cred.user, { displayName: name, photoURL: avatar });
                
                // Save to Firestore Users collection
                await setDoc(doc(db, 'users', cred.user.uid), {
                    uid: cred.user.uid,
                    displayName: name,
                    avatar: avatar,
                    username: rawUsername
                });
            } else {
                await signInWithEmailAndPassword(auth, fakeEmail, password);
            }
        } catch (error) {
            console.error(error);
            showError(error.message.replace('Firebase:', '').trim());
            DOM.authBtn.disabled = false;
        }
    });

    DOM.logoutBtn.addEventListener('click', () => signOut(auth));

    // Listen to login state
    onAuthStateChanged(auth, (user) => {
        DOM.authBtn.disabled = false;
        if (user) {
            currentUser = user;
            DOM.authScreen.style.display = 'none';
            DOM.appScreen.classList.add('active');
            loadContacts();
        } else {
            currentUser = null;
            DOM.appScreen.classList.remove('active');
            DOM.authScreen.style.display = 'flex';
            resetUI();
        }
    });

    function showError(msg) {
        DOM.authError.textContent = msg;
        DOM.authError.classList.add('visible');
        setTimeout(() => DOM.authError.classList.remove('visible'), 4000);
    }

    // --- 2. CONTACTS & CLOUD SYNC LOGIC ---
    function loadContacts() {
        if(unsubscribeUsers) unsubscribeUsers();
        
        // Listen to all users in the database
        unsubscribeUsers = onSnapshot(collection(db, 'users'), (snapshot) => {
            DOM.chatList.innerHTML = ''; 
            
            snapshot.forEach((docSnap) => {
                const targetUser = docSnap.data();
                if (targetUser.uid === currentUser.uid) return; // Hide self

                const div = document.createElement('div');
                div.className = 'chat-item';
                div.innerHTML = `
                    <img src="${targetUser.avatar}" class="chat-avatar">
                    <div class="chat-info">
                        <div class="chat-name">${targetUser.displayName}</div>
                        <div style="font-size: 13px; color: var(--text-secondary);">@${targetUser.username}</div>
                    </div>
                `;
                
                div.addEventListener('click', () => {
                    document.querySelectorAll('.chat-item').forEach(el => el.classList.remove('active'));
                    div.classList.add('active');
                    openPrivateChat(targetUser);
                });
                
                DOM.chatList.appendChild(div);
            });
        });
    }

    // --- 3. PRIVATE ROOM LOGIC ---
    function openPrivateChat(targetUser) {
        // Generate unique Room ID for these two specific users
        const ids = [currentUser.uid, targetUser.uid].sort();
        currentRoomId = `${ids[0]}_${ids[1]}`;

        // Update UI
        DOM.emptyChat.classList.add('hidden');
        DOM.chatHeader.classList.remove('hidden');
        DOM.msgContainer.style.display = 'flex';
        DOM.inputArea.classList.remove('hidden');
        
        DOM.headerName.textContent = targetUser.displayName;
        DOM.headerAvatar.src = targetUser.avatar;

        listenToMessages(currentRoomId);
    }

    function listenToMessages(roomId) {
        if (unsubscribeMessages) unsubscribeMessages();

        const messagesRef = collection(db, 'rooms', roomId, 'messages');
        const q = query(messagesRef, orderBy('timestamp', 'asc'));

        unsubscribeMessages = onSnapshot(q, (snapshot) => {
            DOM.msgContainer.innerHTML = ''; 
            
            snapshot.forEach((change) => {
                const data = change.data();
                const isOwn = data.senderId === currentUser.uid;
                const timeStr = data.timestamp ? new Date(data.timestamp.toDate()).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : 'Now';

                const msgDiv = document.createElement('div');
                msgDiv.className = `message ${isOwn ? 'own' : ''}`;
                msgDiv.innerHTML = `
                    <div class="msg-bubble">
                        ${data.text}
                        <span class="msg-time">${timeStr}</span>
                    </div>
                `;
                DOM.msgContainer.appendChild(msgDiv);
            });

            // Scroll to bottom automatically
            const area = document.getElementById('messages-area');
            area.scrollTop = area.scrollHeight;
        });
    }

    // --- 4. SENDING MESSAGES ---
    DOM.msgInput.addEventListener('input', (e) => {
        DOM.sendBtn.disabled = !e.target.value.trim();
        e.target.style.height = 'auto';
        e.target.style.height = Math.min(e.target.scrollHeight, 100) + 'px';
    });

    DOM.msgInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    });

    DOM.sendBtn.addEventListener('click', sendMessage);

    async function sendMessage() {
        const text = DOM.msgInput.value.trim();
        if (!text || !currentRoomId) return;

        // Clear UI instantly
        DOM.msgInput.value = '';
        DOM.msgInput.style.height = 'auto';
        DOM.sendBtn.disabled = true;

        // Save to Firestore
        await addDoc(collection(db, 'rooms', currentRoomId, 'messages'), {
            text: text,
            senderId: currentUser.uid,
            timestamp: serverTimestamp()
        });
    }

    function resetUI() {
        if(unsubscribeMessages) unsubscribeMessages();
        if(unsubscribeUsers) unsubscribeUsers();
        currentRoomId = null;
        DOM.msgContainer.innerHTML = '';
        DOM.emptyChat.classList.remove('hidden');
        DOM.chatHeader.classList.add('hidden');
        DOM.msgContainer.style.display = 'none';
        DOM.inputArea.classList.add('hidden');
    }
</script>
</body>
</html>
