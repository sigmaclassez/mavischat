<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sigma Nebula | Next-Gen Chat</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --glass-bg: rgba(20, 25, 35, 0.4);
            --glass-border: rgba(255, 255, 255, 0.1);
            --glass-hover: rgba(255, 255, 255, 0.15);
            --text-main: #ffffff;
            --text-muted: #a0aab5;
            --gradient-primary: linear-gradient(135deg, #FF007A, #7928CA);
            --gradient-secondary: linear-gradient(135deg, #00d2ff, #3a7bd5);
            --danger: #ff4757;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

        body {
            background-color: #0f0c29;
            /* Animated Mesh Gradient Background */
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(121, 40, 202, 0.4), transparent 50%),
                radial-gradient(circle at 85% 30%, rgba(0, 210, 255, 0.3), transparent 50%),
                radial-gradient(circle at 50% 80%, rgba(255, 0, 122, 0.3), transparent 50%);
            background-size: 150% 150%;
            animation: gradientMove 15s ease infinite;
            color: var(--text-main);
            height: 100dvh;
            width: 100vw;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* --- GLASSMORPHISM UTILITIES --- */
        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.4);
        }

        /* --- AUTH SCREEN --- */
        #auth-screen {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            width: 100%; height: 100%; position: absolute; z-index: 100;
        }
        .auth-card {
            padding: 50px 40px; border-radius: 24px; text-align: center; width: 90%; max-width: 400px;
            animation: popIn 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }
        @keyframes popIn {
            0% { transform: scale(0.9); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        
        .brand-text {
            font-size: 28px; font-weight: 700; margin-bottom: 5px;
            background: var(--gradient-secondary); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .google-btn {
            display: flex; align-items: center; justify-content: center; gap: 12px; width: 100%;
            padding: 16px; background: rgba(255, 255, 255, 0.05); color: white; border: 1px solid var(--glass-border);
            border-radius: 16px; font-size: 15px; font-weight: 500; cursor: pointer; margin-top: 40px;
            transition: 0.3s; backdrop-filter: blur(10px);
        }
        .google-btn:hover { background: rgba(255, 255, 255, 0.15); transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0,0,0,0.2); }

        /* --- MAIN APP CONTAINER --- */
        #app { 
            display: none; 
            width: 95vw; height: 90dvh; max-width: 1400px;
            border-radius: 30px; flex-direction: row; position: relative; overflow: hidden;
        }
        #app.active { display: flex; animation: fadeUp 0.6s ease; }
        
        @keyframes fadeUp {
            0% { transform: translateY(20px); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }

        /* --- SIDEBAR --- */
        .sidebar {
            width: 350px; border-right: 1px solid var(--glass-border);
            display: flex; flex-direction: column; flex-shrink: 0; position: relative; z-index: 2;
            background: rgba(10, 14, 23, 0.5); /* Slightly darker glass for sidebar */
        }
        .sidebar-header {
            padding: 24px; border-bottom: 1px solid var(--glass-border); display: flex; align-items: center; justify-content: space-between;
        }
        .my-profile { display: flex; align-items: center; gap: 12px; }
        .avatar { width: 48px; height: 48px; border-radius: 16px; object-fit: cover; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        
        .header-actions { display: flex; gap: 10px; }
        .icon-btn {
            background: rgba(255, 255, 255, 0.05); border: 1px solid var(--glass-border); color: var(--text-main);
            width: 36px; height: 36px; border-radius: 12px; display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.2s;
        }
        .icon-btn:hover { background: var(--glass-hover); }
        .icon-btn.danger { color: var(--danger); }
        .icon-btn.danger:hover { background: rgba(255, 71, 87, 0.2); border-color: rgba(255, 71, 87, 0.5); }

        .chat-list { flex: 1; overflow-y: auto; padding: 10px; }
        .chat-list::-webkit-scrollbar { width: 4px; }
        .chat-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }

        .contact-item {
            display: flex; align-items: center; gap: 15px; padding: 12px 16px; margin-bottom: 8px;
            cursor: pointer; border-radius: 16px; transition: 0.3s; border: 1px solid transparent;
        }
        .contact-item:hover { background: var(--glass-hover); border: 1px solid var(--glass-border); }
        .contact-item.active { background: var(--gradient-secondary); box-shadow: 0 8px 20px rgba(0, 210, 255, 0.2); border: none; }

        /* --- CHAT AREA --- */
        .chat-area { 
            flex: 1; display: flex; flex-direction: column; position: relative; height: 100%;
        }
        
        .chat-header {
            padding: 20px 30px; border-bottom: 1px solid var(--glass-border); background: rgba(255, 255, 255, 0.02);
            display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; backdrop-filter: blur(10px);
        }
        .chat-header-info { display: flex; align-items: center; gap: 15px; }
        .back-btn { display: none; background: none; border: none; color: var(--text-main); font-size: 24px; cursor: pointer; padding-right: 10px; }
        
        .clear-chat-btn {
            background: rgba(255, 71, 87, 0.1); color: var(--danger); border: 1px solid rgba(255, 71, 87, 0.3);
            padding: 8px 16px; border-radius: 12px; cursor: pointer; font-size: 13px; font-weight: 500; transition: 0.2s;
        }
        .clear-chat-btn:hover { background: var(--danger); color: white; box-shadow: 0 4px 15px rgba(255, 71, 87, 0.4); }

        /* --- MESSAGES --- */
        .messages-container {
            flex: 1; overflow-y: auto; padding: 30px; display: flex; flex-direction: column; gap: 16px;
        }
        .messages-container::-webkit-scrollbar { width: 6px; }
        .messages-container::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }

        .message-wrapper { display: flex; flex-direction: column; max-width: 75%; animation: slideIn 0.3s ease; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .message-wrapper.own { align-self: flex-end; align-items: flex-end; }
        .message-wrapper.other { align-self: flex-start; align-items: flex-start; }
        
        .message {
            padding: 14px 20px; border-radius: 20px; font-size: 14.5px; line-height: 1.5; 
            display: flex; flex-direction: column; position: relative; box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        
        /* Glass Other Message */
        .message-wrapper.other .message { 
            background: rgba(255, 255, 255, 0.08); border: 1px solid var(--glass-border);
            border-bottom-left-radius: 4px; backdrop-filter: blur(10px);
        }
        
        /* Vibrant Own Message */
        .message-wrapper.own .message { 
            background: var(--gradient-primary); border: none;
            border-bottom-right-radius: 4px;
        }
        
        .msg-time { font-size: 10px; opacity: 0.7; margin-top: 6px; align-self: flex-end; }
        
        .del-msg-icon {
            font-size: 12px; cursor: pointer; color: var(--danger); opacity: 0; transition: 0.2s; margin-top: 6px;
            background: rgba(255, 71, 87, 0.1); padding: 4px 10px; border-radius: 8px;
        }
        .message-wrapper.own:hover .del-msg-icon { opacity: 1; }

        /* --- INPUT AREA --- */
        .input-area {
            padding: 20px 30px; background: transparent; display: flex; gap: 15px; align-items: center; flex-shrink: 0;
            padding-bottom: max(20px, env(safe-area-inset-bottom));
        }
        .floating-input-wrapper {
            flex: 1; display: flex; align-items: center; background: rgba(255, 255, 255, 0.07);
            border: 1px solid var(--glass-border); border-radius: 30px; padding: 6px 6px 6px 20px;
            backdrop-filter: blur(15px); box-shadow: 0 8px 25px rgba(0,0,0,0.2);
        }
        .floating-input-wrapper input {
            flex: 1; border: none; background: transparent; color: white; font-size: 15px; outline: none;
        }
        .floating-input-wrapper input::placeholder { color: var(--text-muted); }
        
        .send-btn {
            width: 44px; height: 44px; border-radius: 50%; border: none; background: var(--text-main); color: #000;
            cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: 0.3s;
        }
        .send-btn:hover:not(:disabled) { transform: scale(1.05); box-shadow: 0 0 15px rgba(255,255,255,0.5); }
        .send-btn:disabled { opacity: 0.3; cursor: not-allowed; }
        
        .empty-state {
            flex: 1; display: flex; align-items: center; justify-content: center; color: var(--text-muted); 
            text-align: center; flex-direction: column; padding: 20px;
        }
        
        .glow-icon {
            width: 80px; height: 80px; background: var(--gradient-secondary); border-radius: 50%;
            display: flex; align-items: center; justify-content: center; margin-bottom: 20px;
            box-shadow: 0 0 30px rgba(0, 210, 255, 0.4); color: white;
        }

        .hidden { display: none !important; }

        /* =========================================
           📱 MOBILE RESPONSIVE FIX (EDGE-TO-EDGE)
           ========================================= */
        @media (max-width: 768px) {
            #app { width: 100vw; height: 100dvh; border-radius: 0; border: none; }
            .sidebar { width: 100%; border-right: none; }
            
            .chat-area {
                position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10;
                transform: translateX(100%); transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
                background: rgba(15, 12, 41, 0.95); backdrop-filter: blur(30px);
            }
            
            #app.chat-active .chat-area { transform: translateX(0); }
            .back-btn { display: block; }
            .empty-state { display: none !important; }
            .message-wrapper { max-width: 90%; }
            .input-area { padding: 15px; }
        }
    </style>
</head>
<body>

    <!-- AUTHENTICATION SCREEN -->
    <div id="auth-screen">
        <div class="auth-card glass-panel">
            <h1 class="brand-text">Sigma Nebula</h1>
            <p style="color: var(--text-muted); font-size: 14px; font-weight: 300;">by Alok Sir</p>
            
            <button class="google-btn" id="login-btn">
                <svg width="22" height="22" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
                Continue with Google
            </button>
            
            <p id="auth-error" style="color: var(--danger); font-size: 13px; margin-top: 15px; display: none;"></p>
        </div>
    </div>

    <!-- MAIN APPLICATION -->
    <div id="app" class="glass-panel">
        
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="sidebar-header">
                <div class="my-profile">
                    <img src="" id="my-avatar" class="avatar">
                    <div>
                        <div id="my-name" style="font-weight: 600; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 120px;"></div>
                        <div style="font-size: 11px; color: #00d2ff;">Connected</div>
                    </div>
                </div>
                <div class="header-actions">
                    <!-- Delete Account Button -->
                    <button class="icon-btn danger" id="delete-account-btn" title="Delete Account & Hide Profile">
                        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"></path></svg>
                    </button>
                    <!-- Logout Button -->
                    <button class="icon-btn" id="logout-btn" title="Log Out">
                        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"></path></svg>
                    </button>
                </div>
            </div>
            
            <div class="chat-list" id="contact-list">
                <!-- Users will populate here -->
            </div>
        </div>

        <!-- Chat Area -->
        <div class="chat-area">
            
            <!-- Default Empty State -->
            <div class="empty-state" id="empty-state">
                <div class="glow-icon">
                    <svg width="32" height="32" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 11.5a8.38 8.38 0 01-.9 3.8 8.5 8.5 0 01-7.6 4.7 8.38 8.38 0 01-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 01-.9-3.8 8.5 8.5 0 014.7-7.6 8.38 8.38 0 013.8-.9h.5a8.48 8.48 0 018 8v.5z"></path></svg>
                </div>
                <h3 class="brand-text">Sigma Nebula</h3>
                <p style="font-size: 14px; font-weight: 300;">Tap a contact to initialize secure link.</p>
                <p style="margin-top: 30px; font-size: 11px; text-transform: uppercase; letter-spacing: 2px; color: rgba(255,255,255,0.3);">Sponsored by Sigma Coaching Classes</p>
            </div>

            <!-- Active Chat State -->
            <div id="active-chat" class="hidden" style="display: flex; flex-direction: column; height: 100%;">
                
                <!-- Chat Header -->
                <div class="chat-header">
                    <div class="chat-header-info">
                        <button class="back-btn" id="back-btn">
                            <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"></path></svg>
                        </button>
                        <img src="" id="chat-avatar" class="avatar">
                        <span id="chat-name" style="font-weight: 600; font-size: 16px;"></span>
                    </div>
                    <button class="clear-chat-btn" id="clear-chat-btn">Erase Chat</button>
                </div>

                <!-- Messages -->
                <div class="messages-container" id="messages">
                    <!-- Messages will populate here -->
                </div>

                <!-- Input -->
                <div class="input-area">
                    <div class="floating-input-wrapper">
                        <input type="text" id="msg-input" placeholder="Transmit message..." autocomplete="off">
                        <button class="send-btn" id="send-btn" disabled>
                            <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"></path></svg>
                        </button>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <!-- FIREBASE MODULES & LOGIC -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut, deleteUser } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, addDoc, deleteDoc, getDocs, query, orderBy, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBdz1-Y06YkgAD-Ty7AQkSRYb1dwNDAoqo",
            authDomain: "sigmachat-7b6fc.firebaseapp.com",
            projectId: "sigmachat-7b6fc",
            storageBucket: "sigmachat-7b6fc.firebasestorage.app",
            messagingSenderId: "991645777861",
            appId: "1:991645777861:web:940b910b80fdcd90c815ac"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        let currentUser = null;
        let currentRoomId = null;
        let unsubUsers = null;
        let unsubMessages = null;

        // --- AUTHENTICATION FLOW ---
        document.getElementById('login-btn').onclick = async () => {
            try {
                await signInWithPopup(auth, provider);
            } catch (err) {
                const errEl = document.getElementById('auth-error');
                errEl.textContent = err.message;
                errEl.style.display = 'block';
            }
        };

        document.getElementById('logout-btn').onclick = () => signOut(auth);

        // --- DELETE ACCOUNT FLOW ---
        document.getElementById('delete-account-btn').onclick = async () => {
            if(confirm("CRITICAL: Do you want to delete your profile? Your name will disappear from everyone's contact list permanently.")) {
                try {
                    // Remove from public Firestore list
                    await deleteDoc(doc(db, 'users', currentUser.uid));
                    // Attempt to delete Auth account (might require recent login)
                    await deleteUser(currentUser);
                } catch(e) {
                    console.log(e);
                    // Even if Firebase Auth delete fails, the Firestore delete succeeded.
                    // The user is hidden from the app. Sign them out manually.
                    await signOut(auth);
                }
            }
        };

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('app').classList.add('active');
                
                document.getElementById('my-name').textContent = user.displayName;
                document.getElementById('my-avatar').src = user.photoURL;

                // Add to public contact list
                await setDoc(doc(db, 'users', user.uid), {
                    uid: user.uid,
                    name: user.displayName,
                    photo: user.photoURL,
                    email: user.email,
                    lastLogin: serverTimestamp()
                });

                loadUsers();
            } else {
                currentUser = null;
                document.getElementById('app').classList.remove('active');
                document.getElementById('auth-screen').style.display = 'flex';
                resetChatUI();
            }
        });

        // --- LOAD USERS (SIDEBAR) ---
        function loadUsers() {
            if(unsubUsers) unsubUsers();
            unsubUsers = onSnapshot(collection(db, 'users'), (snapshot) => {
                const list = document.getElementById('contact-list');
                list.innerHTML = ''; 
                snapshot.forEach((docSnap) => {
                    const user = docSnap.data();
                    if (user.uid === currentUser.uid) return; 

                    const div = document.createElement('div');
                    div.className = 'contact-item glass-panel';
                    div.style.background = "transparent";
                    div.innerHTML = `
                        <img src="${user.photo}" class="avatar">
                        <div>
                            <div style="font-weight: 500; font-size: 14px;">${user.name}</div>
                            <div style="font-size: 11px; color: var(--text-muted);">Available</div>
                        </div>
                    `;
                    
                    div.onclick = () => {
                        document.querySelectorAll('.contact-item').forEach(el => el.classList.remove('active'));
                        div.classList.add('active');
                        openChat(user);
                    };
                    list.appendChild(div);
                });
            });
        }

        // --- OPEN CHAT ROOM ---
        function openChat(targetUser) {
            const ids = [currentUser.uid, targetUser.uid].sort();
            currentRoomId = `${ids[0]}_${ids[1]}`;

            document.getElementById('empty-state').classList.add('hidden');
            document.getElementById('active-chat').classList.remove('hidden');
            document.getElementById('chat-name').textContent = targetUser.name;
            document.getElementById('chat-avatar').src = targetUser.photo;
            
            // Trigger Mobile Animation
            document.getElementById('app').classList.add('chat-active');

            loadMessages(currentRoomId);
        }

        // --- MOBILE BACK BUTTON ---
        document.getElementById('back-btn').onclick = () => {
            document.getElementById('app').classList.remove('chat-active');
            document.querySelectorAll('.contact-item').forEach(el => el.classList.remove('active'));
        };

        // --- LOAD & RENDER MESSAGES ---
        function loadMessages(roomId) {
            if (unsubMessages) unsubMessages();
            const msgRef = collection(db, 'rooms', roomId, 'messages');
            const q = query(msgRef, orderBy('timestamp', 'asc'));

            unsubMessages = onSnapshot(q, (snapshot) => {
                const container = document.getElementById('messages');
                container.innerHTML = ''; 
                snapshot.forEach((docSnap) => {
                    const data = docSnap.data();
                    const isOwn = data.senderId === currentUser.uid;
                    const time = data.timestamp ? new Date(data.timestamp.toDate()).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : '';
                    const div = document.createElement('div');
                    div.className = `message-wrapper ${isOwn ? 'own' : 'other'}`;
                    div.innerHTML = `
                        <div class="message">
                            <span>${data.text}</span>
                            <span class="msg-time">${time}</span>
                        </div>
                        ${isOwn ? `<div class="del-msg-icon" onclick="window.deleteSingleMessage('${docSnap.id}')">Erase</div>` : ''}
                    `;
                    container.appendChild(div);
                });
                container.scrollTop = container.scrollHeight; 
            });
        }

        // --- SEND MESSAGES ---
        const msgInput = document.getElementById('msg-input');
        const sendBtn = document.getElementById('send-btn');
        msgInput.oninput = () => sendBtn.disabled = !msgInput.value.trim();
        msgInput.onkeydown = (e) => { if (e.key === 'Enter') sendMessage(); };
        sendBtn.onclick = sendMessage;

        async function sendMessage() {
            const text = msgInput.value.trim();
            if (!text || !currentRoomId) return;
            msgInput.value = '';
            sendBtn.disabled = true;
            await addDoc(collection(db, 'rooms', currentRoomId, 'messages'), {
                text: text, senderId: currentUser.uid, timestamp: serverTimestamp()
            });
            msgInput.focus();
        }

        // --- DELETE LOGIC ---
        window.deleteSingleMessage = async function(messageId) {
            if (!currentRoomId) return;
            await deleteDoc(doc(db, 'rooms', currentRoomId, 'messages', messageId));
        };

        document.getElementById('clear-chat-btn').onclick = async () => {
            if (!currentRoomId) return;
            if (confirm("Permanently erase all messages in this link?")) {
                const msgRef = collection(db, 'rooms', currentRoomId, 'messages');
                const snapshot = await getDocs(query(msgRef));
                snapshot.forEach(async (docSnap) => {
                    await deleteDoc(doc(db, 'rooms', currentRoomId, 'messages', docSnap.id));
                });
            }
        };

        function resetChatUI() {
            if(unsubMessages) unsubMessages();
            if(unsubUsers) unsubUsers();
            currentRoomId = null;
            document.getElementById('messages').innerHTML = '';
            document.getElementById('empty-state').classList.remove('hidden');
            document.getElementById('active-chat').classList.add('hidden');
            document.getElementById('app').classList.remove('chat-active');
        }
    </script>
